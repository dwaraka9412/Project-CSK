<!DOCTYPE html>
<html>
<head>
<title>OTP Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top right, #141e30, #243b55);
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

.card {
  width: 300px;
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.07);
  padding: 35px;
  border-radius: 20px;
  box-shadow:
    10px 10px 30px rgba(0,0,0,0.6),
    -5px -5px 20px rgba(255,255,255,0.04);
  text-align: center;
}

h2 {
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  margin: 12px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  text-align: center;
  font-size: 18px;
  letter-spacing: 3px;
  background: rgba(255,255,255,0.15);
  color: white;
}

input:focus {
  box-shadow: 0 0 12px #00c6ff;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(145deg,#00c6ff,#0072ff);
  color: white;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 5px 5px 15px rgba(0,0,0,0.5);
  transition: all 0.2s ease;
}

button:active {
  transform: scale(0.95);
}

</style>
</head>

<body>

<div class="card">
  <h2>Verify OTP 🔐</h2>

  <form action="/verify-otp" method="POST">
    <input type="hidden" name="email" id="email">
    <input type="text" name="otp" placeholder="Enter 6-digit OTP" maxlength="6" required>
    <button type="submit">Verify</button>
  </form>
</div>

<script>
const params = new URLSearchParams(window.location.search);
document.getElementById("email").value = params.get("email");
</script>

</body>
</html>
